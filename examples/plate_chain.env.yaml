# Environment for plate_chain.workflow.yaml. The plate is loaded on `loader`,
# processed by `step` on `worker`, and delivered to `unloader`; `arm` moves it
# along. `step` transforms the plate in place on the worker (input and output spot
# are the same). The Int ports are Pure Data and occupy nothing.
time:
  unit: second

devices:
  - { id: loader,   spots: [stage] }
  - { id: worker,   spots: [stage] }
  - { id: unloader, spots: [slot] }

transporters:
  - { id: arm }

transports:
  - { transporter: arm, from: loader.stage, to: worker.stage, duration: 2 }
  - { transporter: arm, from: worker.stage, to: unloader.slot, duration: 2 }

processes:
  step:
    modes:
      - devices: [worker]
        duration: 3
        input_spots:  { plate: worker.stage }
        output_spots: { plate: worker.stage }   # same spot: in-place transform

objective:
  kind: makespan
