# Environment for the re-routing example. `target` can run on either station_1
# (reached cheaply, station_0 -> station_1 duration 1) or station_2. The initial
# plan therefore runs target on station_1. If station_1 goes down after the sample
# has been delivered there, the runner reduces the environment (drops target's
# station_1 mode) and the scheduler re-routes: a relay at station_1.core plus a
# re-transport station_1.core -> station_2.core (duration 4), then target on
# station_2.
time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1
    spots: [core]
  - id: station_2
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }
  - { transporter: transport, from: station_1.core, to: station_2.core, duration: 4 }
  - { transporter: transport, from: station_0.core, to: station_2.core, duration: 10 }

processes:

  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots:
          source_out: station_0.core

  target:
    modes:
      - devices: [station_1]
        duration: 2
        input_spots:
          target_in: station_1.core
      - devices: [station_2]
        duration: 2
        input_spots:
          target_in: station_2.core

objective:
  kind: makespan
