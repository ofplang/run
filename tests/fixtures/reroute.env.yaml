# Environment fixture for re-routing the `simple` workflow (2b-2a).
#
# `target` can run on either station_1 or station_2. station_1 is reached
# cheaply (station_0 -> station_1, duration 1), so the initial plan runs target
# there (makespan 5). If station_1 goes down after the sample has been delivered
# to it, the runner reduces the environment (drops target's station_1 mode) and
# the scheduler re-routes: a relay at station_1.core plus a re-transport
# station_1.core -> station_2.core (duration 4), then target on station_2.
time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1
    spots: [core]
  - id: station_2
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }
  - { transporter: transport, from: station_1.core, to: station_2.core, duration: 4 }
  - { transporter: transport, from: station_0.core, to: station_2.core, duration: 10 }

processes:

  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots:
          source_out: station_0.core

  target:
    modes:
      - devices: [station_1]
        duration: 2
        input_spots:
          target_in: station_1.core
      - devices: [station_2]
        duration: 2
        input_spots:
          target_in: station_2.core

objective:
  kind: makespan
