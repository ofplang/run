# Like nested_returns.workflow.yaml, but the Pure Data types carry view schemas,
# so the typed values the backend generates are non-empty records (dev-notes D27
# F2). Reuses the pure_data environment and interface (same processes/ports/spots;
# the environment is untyped, so adding view fields does not affect scheduling).
#
#   sample --(object)--> Measure --(object)------> Finish
#                           |                        ^
#                           +--reading(data)--> Analyzer{A} --score(data)--+
#                                                    |
#                                       returns final_score <-- Analyzer.a_score
spec_version: "0.0"

types:
  # An object type with a view: its value is the view record (identity is the
  # simulator's concern), so a supplied job value for the `sample` entry is checkable.
  Plate:
    domain: object
    view:
      barcode: { type: String }
  # Pure Data types with flat view schemas (§7.4): the contract-visible fields.
  Reading:
    domain: data
    view:
      mean: { type: Float }
      n:    { type: Int }
  Score:
    domain: data
    view:
      value: { type: Float }
      ok:    { type: Bool }

processes:

  measure:
    kind: atomic
    inputs:
      plate: { type: Plate, phase: data }
    outputs:
      plate_out: { type: Plate,   phase: data }
      reading:   { type: Reading, phase: data }
    objects:
      transform: [inputs.plate, outputs.plate_out]

  analyze:
    kind: atomic
    inputs:
      reading: { type: Reading, phase: data }
    outputs:
      score: { type: Score, phase: data }

  finish:
    kind: atomic
    inputs:
      plate_in: { type: Plate, phase: data }
      go:       { type: Score, phase: data }
    objects:
      consume: [inputs.plate_in]

  analyzer:
    kind: composite
    inputs:
      a_reading: { type: Reading, phase: data }
    outputs:
      a_score: { type: Score, phase: data }
    body:
      nodes:
        - id: A
          process: analyze
          bind:
            reading: { from: inputs.a_reading }
      returns:
        a_score: { from: A.score }

  main:
    kind: composite
    inputs:
      sample: { type: Plate, phase: data }
    outputs:
      final_score: { type: Score, phase: data }
    body:
      nodes:
        - id: Measure
          process: measure
          state:
            plate: { from: inputs.sample }
        - id: Az
          process: analyzer
          bind:
            a_reading: { from: Measure.reading }
        - id: Finish
          process: finish
          state:
            plate_in: { from: Measure.plate_out }
          bind:
            go: { from: Az.a_score }
      returns:
        final_score: { from: Az.a_score }

entry: main
