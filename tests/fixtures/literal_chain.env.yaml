# Environment for literal_chain.workflow.yaml: `emit` is a device-less Pure-Data-only
# process (no devices, no spots). The workflow uses no physical resources, but the
# scheduler requires at least one device to exist, so a single unused rack is
# declared (the pure-data op never touches it).
time:
  unit: second

devices:
  - { id: rack, spots: [slot] }
transporters:
  - { id: arm }
transports: []

processes:
  emit:
    modes:
      - { id: v0, duration: 1 }

objective:
  kind: makespan
