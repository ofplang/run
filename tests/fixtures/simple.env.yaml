# Execution environment fixture for simple.workflow.yaml (§5): two devices with
# one spot each, one transporter, one route.
time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }

processes:

  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots:
          source_out: station_0.core

  target:
    modes:
      - devices: [station_1]
        duration: 2
        input_spots:
          target_in: station_1.core

objective:
  kind: makespan
