# Same as simple.env.yaml but with no capability for `target`, so the workflow
# cannot be scheduled (no_capability -> the scheduler produces no plan). Used to
# check the runner reports an execution failure.
time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }

processes:

  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots:
          source_out: station_0.core

objective:
  kind: makespan
