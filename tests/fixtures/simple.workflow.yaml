# Minimal v0 workflow fixture (copied from ofplang-schedule examples): a `source`
# step produces one Sample, a `target` step consumes it, joined by one
# Object-bearing arc. No Object-bearing entry input (source creates), so no
# interface is required to schedule it.
spec_version: "0.0"

types:
  Sample:
    domain: object

processes:

  source:
    kind: atomic
    outputs:
      source_out: { type: Sample, phase: data }
    objects:
      create: [outputs.source_out]

  target:
    kind: atomic
    inputs:
      target_in: { type: Sample, phase: data }
    objects:
      consume: [inputs.target_in]

  main:
    kind: composite
    inputs: {}
    outputs: {}
    body:
      nodes:
        - id: SampleSource
          process: source

        - id: SampleTarget
          process: target
          state:
            target_in:
              from: SampleSource.source_out
      returns: {}

entry: main
