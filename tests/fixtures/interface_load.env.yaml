# Environment fixture for interface_load.workflow.yaml: the sample is loaded on
# `loader`, heated on `heater`, and the result delivered to `output`. Boundary
# transports move loader.stage -> heater.stage (entry input) and heater.stage ->
# output.slot (final output); the interface pins the two boundary spots.
time:
  unit: second

devices:
  - id: loader
    spots: [stage]
  - id: heater
    spots: [stage]
  - id: output
    spots: [slot]

transporters:
  - id: arm

transports:
  - { transporter: arm, from: loader.stage, to: heater.stage, duration: 2 }
  - { transporter: arm, from: heater.stage, to: output.slot, duration: 2 }

processes:

  heat:
    modes:
      - devices: [heater]
        duration: 10
        input_spots:  { plate: heater.stage }
        output_spots: { out: heater.stage }

objective:
  kind: makespan
