# Environment for failure.workflow.yaml (§5). Each chain has its own source and
# sink device; `arm` moves each source's plate to its sink. `src_bad` is short
# (duration 2) and `src_slow` is long (duration 6), so when `src_bad` fails at t=2
# the `src_slow` operation is still running.
time:
  unit: second

devices:
  - id: bad_src
    spots: [core]
  - id: bad_sink
    spots: [core]
  - id: slow_src
    spots: [core]
  - id: slow_sink
    spots: [core]

transporters:
  - id: arm

transports:
  - { transporter: arm, from: bad_src.core,  to: bad_sink.core,  duration: 1 }
  - { transporter: arm, from: slow_src.core, to: slow_sink.core, duration: 1 }

processes:
  src_bad:
    modes:
      - { devices: [bad_src], duration: 2, output_spots: { out: bad_src.core } }
  sink_bad:
    modes:
      - { devices: [bad_sink], duration: 2, input_spots: { in: bad_sink.core } }
  src_slow:
    modes:
      - { devices: [slow_src], duration: 6, output_spots: { out: slow_src.core } }
  sink_slow:
    modes:
      - { devices: [slow_sink], duration: 2, input_spots: { in: slow_sink.core } }

objective:
  kind: makespan
